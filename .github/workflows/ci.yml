name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: go vet
        run: go vet ./...

      - name: Build publish-test-results binary
        run: go build -o bin/publish-test-results ./cmd/publish-test-results

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests via gotestsum (writes results.xml)
        run: gotestsum --junitfile=results.xml --format=pkgname -- -race -count=1 ./...

      - name: Upload JUnit XML artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-junit-xml
          path: results.xml

      - name: Self-parse test results (dogfood the JUnit parser)
        if: always()
        run: ./bin/publish-test-results --files=results.xml --dry-run
