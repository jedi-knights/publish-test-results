name: GoReleaser

# Triggered by the v* tag that go-semantic-release pushes during the
# release workflow. GoReleaser reads the version from the tag, cross-compiles
# for all supported platforms, packages the archives, and creates the GitHub
# release with all assets attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # GoReleaser needs full history to generate a correct changelog.
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # Marketplace consumers reference the major-only tag (@v0, @v1) so
      # they float onto every patch/minor within that major automatically.
      # We re-point that tag at the just-released commit on every push of
      # a v<major>.<minor>.<patch> tag.
      - name: Update floating major tag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          full="${GITHUB_REF#refs/tags/}"       # v0.1.2
          major="${full%%.*}"                    # v0
          # Skip pre-releases and anything that isn't a clean v<major>.<minor>.<patch>.
          if [[ ! "$full" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Not a semver release tag ($full), skipping floating-tag update."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "$GITHUB_SHA"
          git push origin -f "refs/tags/$major"
